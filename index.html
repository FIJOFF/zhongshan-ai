<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:linear-gradient(135deg,#081827,#0f2848 50%,#1253a4);display:flex;align-items:center;justify-content:space-between;padding:0 14px;box-shadow:0 2px 12px rgba(0,0,0,.3);z-index:200}

.hdr-l h1{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100vw - 200px)}
.hdr-l .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:7px;padding:6px 13px;cursor:pointer;font-size:13px;font-family:inherit;transition:background .18s;white-space:nowrap;display:flex;align-items:center;gap:4px;text-decoration:none}
.btn:hover{background:rgba(255,255,255,.2)}
.dl-btn{border-color:rgba(0,229,255,.35);background:rgba(0,229,255,.1)}
.dl-btn:hover{background:rgba(0,229,255,.22)}
#pageInfo{font-size:13px;padding:0 8px;color:rgba(255,255,255,.9);white-space:nowrap}
#hamburger{display:none}
.body-wrap{display:flex;padding-top:var(--header-h);height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);flex-shrink:0;overflow-y:auto;padding:10px 6px;scrollbar-width:thin;scrollbar-color:#2e4f7a #18283f;transition:transform .28s ease}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#2e4f7a;border-radius:2px}
.sidebar-hdr{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:1.5px;padding:0 3px 8px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:8px}
.thumb-item{cursor:pointer;border-radius:6px;overflow:hidden;margin-bottom:6px;border:2px solid transparent;background:rgba(255,255,255,.03);transition:border-color .18s,background .18s;position:relative}
.thumb-item:hover{border-color:rgba(13,123,216,.45);background:rgba(255,255,255,.07)}
.thumb-item.active{border-color:#0d7bd8;box-shadow:0 0 0 2px rgba(13,123,216,.25)}
.thumb-item img{width:100%;display:block}
.thumb-num{position:absolute;bottom:3px;right:4px;font-size:9px;font-weight:700;color:rgba(255,255,255,.85);background:rgba(0,0,0,.52);padding:1px 4px;border-radius:3px}
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 16px 80px;background:#dce3ef;scroll-behavior:smooth}
.slide-item{width:100%;display:flex;justify-content:center;margin-bottom:28px;padding:0 12px}
.slide-item img{max-width:100%;height:auto;display:block;border-radius:4px;box-shadow:0 10px 40px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.1);transition:box-shadow .25s}
.slide-item.active img{box-shadow:0 10px 48px rgba(0,0,0,.26),0 2px 8px rgba(0,0,0,.1),0 0 0 3px rgba(13,123,216,.2)}
.page-indicator{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(20,40,70,.88);color:#fff;font-size:13px;padding:6px 18px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:190;pointer-events:none;backdrop-filter:blur(6px);transition:opacity .4s}
.back-top{position:fixed;bottom:22px;right:22px;width:38px;height:38px;background:rgba(20,40,70,.85);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:50%;cursor:pointer;z-index:190;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;opacity:0;pointer-events:none}
.back-top.show{opacity:1;pointer-events:auto}
.back-top:hover{background:rgba(13,123,216,.85)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:299}
.overlay.show{display:block}
@media(max-width:768px){:root{--header-h:52px}#hamburger{display:flex}.sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;z-index:300;transform:translateX(-100%);width:220px}.sidebar.open{transform:translateX(0)}.hdr-l h1{font-size:13px;max-width:calc(100vw - 120px)}.hdr-l .sub{display:none}.content-area{padding:16px 6px 60px}.slide-item{margin-bottom:18px;padding:0 4px}.slide-item img{border-radius:2px}.page-indicator{bottom:18px;font-size:12px;padding:5px 14px}.back-top{bottom:14px;right:12px;width:34px;height:34px;font-size:16px}}

var T=52,cur=0,ticking=false;
var CA=document.getElementById('contentArea'),SS=document.querySelectorAll('.slide-item'),TH=document.querySelectorAll('.thumb-item'),PI=document.getElementById('pageInfo'),PM=document.getElementById('pageIndicatorMobile'),BT=document.getElementById('backTop');
function update(){var c=0,d=Infinity,R=CA.getBoundingClientRect(),M=R.top+R.height*.35;SS.forEach(function(e,i){var r=e.getBoundingClientRect(),m=r.top+r.height/2,x=Math.abs(m-M);if(x<d){d=x;c=i}});if(c!==cur){cur=c;PI.textContent=(c+1)+' / '+T;if(PM)PM.textContent=(c+1)+' / '+T;TH.forEach(function(t,i){t.classList.toggle('active',i===c)});SS.forEach(function(s,i){s.classList.toggle('active',i===c)});var at=TH[c];if(at)at.scrollIntoView({behavior:'smooth',block:'nearest'})}BT.classList.toggle('show',CA.scrollTop>600)}
CA.addEventListener('scroll',function(){if(!ticking){requestAnimationFrame(function(){update();ticking=false});ticking=true}},{passive:true});
function scrollToSlide(i){if(i<0||i>=T)return;SS[i].scrollIntoView({behavior:'smooth',block:'center'})}
function toggleSidebar(){var s=document.getElementById('sidebar'),o=document.getElementById('overlay');s.classList.toggle('open');o.classList.toggle('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(function(){});else document.exitFullscreen()}
document.addEventListener('keydown',function(e){if(e.key==='ArrowDown'||e.key==='PageDown'){e.preventDefault();scrollToSlide(cur+1)}if(e.key==='ArrowUp'||e.key==='PageUp'){e.preventDefault();scrollToSlide(cur-1)}if(e.key==='Home'){e.preventDefault();scrollToSlide(0)}if(e.key==='End'){e.preventDefault();scrollToSlide(T-1)}if(e.key==='f'||e.key==='F')toggleFullscreen()});
update();
</script>
</body>
</html>
